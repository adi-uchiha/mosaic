name: Release Mosaic

on:
  push:
    tags:
      - 'v*.*.*'   # Triggers on tags like v1.0.0, v1.2.3

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Required to create GitHub Releases

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Extract changelog entry for this version
        id: changelog
        run: |
          VERSION_BARE="${GITHUB_REF_NAME#v}"
          # Pull the section for this version from CHANGELOG.md
          NOTES=$(awk "/^## \[${VERSION_BARE}\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md)
          echo "$NOTES" > release_notes.txt
          echo "Extracted release notes for $VERSION_BARE"
          cat release_notes.txt

      - name: Create production ZIP
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"

          # GitHub Actions checks out to the workspace root — there is no
          # 'mosaic/' subfolder. We stage files into _build/mosaic/ so the
          # ZIP preserves the expected folder structure for users.
          mkdir -p _build/mosaic

          rsync -a \
            --exclude='.git' \
            --exclude='_build' \
            --exclude='store-listing' \
            --exclude='README.md' \
            --exclude='PUBLISHING.md' \
            --exclude='EDGE_PUBLISHING.md' \
            --exclude='GITHUB_RELEASES.md' \
            --exclude='CHANGELOG.md' \
            --exclude='image.png' \
            --exclude='.DS_Store' \
            --exclude='*.zip' \
            . _build/mosaic/

          cd _build
          zip -r "../mosaic-${VERSION}.zip" mosaic/
          cd ..

          # Stable 'mosaic.zip' always points to the latest build
          cp "mosaic-${VERSION}.zip" "mosaic.zip"

          echo "ZIP size: $(du -sh mosaic-${VERSION}.zip | cut -f1)"
          unzip -l "mosaic-${VERSION}.zip"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Mosaic ${{ steps.version.outputs.VERSION }}"
          body_path: release_notes.txt
          files: |
            mosaic-${{ steps.version.outputs.VERSION }}.zip
            mosaic.zip
          draft: false
          prerelease: false

