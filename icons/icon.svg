    fill="none" stroke="#22c55e" stroke-width="5"/>

  <!-- Top-right tile -->
  <rect x="70" y="10" width="48" height="48" rx="11" ry="11"
    fill="none" stroke="#22c55e" stroke-width="5"/>

  <!-- Bottom-left tile -->
  <rect x="10" y="70" width="48" height="48" rx="11" ry="11"
    fill="none" stroke="#22c55e" stroke-width="5"/>

  <!-- Bottom-right tile -->
  <rect x="70" y="70" width="48" height="48" rx="11" ry="11"
    fill="none" stroke="#22c55e" stroke-width="5"/>
</svg>
